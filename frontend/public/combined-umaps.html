<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>汇总 UMAP</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --panel: #fffdf8;
        --ink: #1f2a1f;
        --muted: #66715f;
        --line: #d8d1c2;
        --accent: #1f6b5d;
        --accent-soft: #d7ebe5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background:
          radial-gradient(circle at top left, #efe6d6 0, transparent 28%),
          linear-gradient(180deg, #faf7f0 0%, var(--bg) 100%);
        color: var(--ink);
      }

      .page {
        max-width: 1600px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .hero {
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, 1.8fr) minmax(280px, 0.8fr);
        margin-bottom: 24px;
      }

      .hero-card,
      .summary-card,
      .card {
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 18px 50px rgba(41, 45, 31, 0.08);
      }

      .hero-card {
        padding: 28px;
      }

      .hero-card h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 4vw, 52px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .hero-card p,
      .summary-card p,
      .meta,
      .hint,
      .status {
        color: var(--muted);
      }

      .eyebrow {
        margin: 0 0 10px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 12px;
        color: var(--accent);
        font-weight: 700;
      }

      .summary-card {
        padding: 24px;
        display: grid;
        gap: 14px;
      }

      .stats {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat {
        padding: 14px;
        background: var(--accent-soft);
        border-radius: 14px;
      }

      .stat strong {
        display: block;
        font-size: 28px;
        line-height: 1;
        margin-bottom: 6px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      .control {
        display: flex;
        gap: 8px;
        align-items: center;
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
      }

      .control input {
        width: 84px;
        border: 0;
        background: transparent;
        font: inherit;
        color: var(--ink);
        outline: none;
      }

      .grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }

      .card {
        padding: 16px;
      }

      .card h2 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .meta {
        margin: 8px 0 12px;
        font-size: 13px;
      }

      canvas {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 14px;
        background: linear-gradient(180deg, #f8f4eb 0%, #f2ece1 100%);
        border: 1px solid #e6decd;
      }

      .footer {
        margin-top: 12px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #f1ece0;
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
      }

      .status {
        margin: 0 0 18px;
      }

      .error {
        color: #a13030;
        font-weight: 600;
      }

      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .page {
          padding-left: 14px;
          padding-right: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <div class="hero-card">
          <p class="eyebrow">汇总视图</p>
          <h1>所有样本的 UMAP 汇总页</h1>
          <p>
            这个页面会从当前本地 API 自动读取所有单细胞样本的 embedding，把每个样本画成一个小面板，集中放在同一个 HTML 里。
          </p>
          <p class="hint">
            这里采用的是同页并列展示，而不是把不同样本的 UMAP 坐标直接叠在一张图上。这样更稳妥，因为不同样本的
            UMAP 坐标本来就不共享同一个几何空间。
          </p>
        </div>
        <div class="summary-card">
          <div>
            <p class="eyebrow">概览</p>
            <div class="stats">
              <div class="stat">
                <strong id="dataset-count">-</strong>
                <span>样本数</span>
              </div>
              <div class="stat">
                <strong id="cell-count">-</strong>
                <span>已索引行</span>
              </div>
              <div class="stat">
                <strong id="drawn-count">-</strong>
                <span>绘制点数</span>
              </div>
              <div class="stat">
                <strong id="api-base">-</strong>
                <span>API 端口</span>
              </div>
            </div>
          </div>
          <div class="chip">
            <span class="dot"></span>
            <span>颜色 = 细胞类型 / 标签</span>
          </div>
        </div>
      </section>

      <div class="controls">
        <label class="control">
          <span>每个数据集最多点数</span>
          <input id="max-points" type="number" min="200" max="10000" step="100" value="2500" />
        </label>
        <button class="control" id="reload-button" type="button">重新加载</button>
      </div>

      <p class="status" id="status">正在加载数据集...</p>
      <section class="grid" id="grid"></section>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const apiBase =
        params.get("api") || `${window.location.protocol}//${window.location.hostname || "localhost"}:8000`;

      const statusEl = document.getElementById("status");
      const gridEl = document.getElementById("grid");
      const datasetCountEl = document.getElementById("dataset-count");
      const cellCountEl = document.getElementById("cell-count");
      const drawnCountEl = document.getElementById("drawn-count");
      const apiBaseEl = document.getElementById("api-base");
      const maxPointsInput = document.getElementById("max-points");
      const reloadButton = document.getElementById("reload-button");
      const exactTextTranslations = new Map([
        ["Lung Tumor Immune Atlas", "肺肿瘤免疫图谱"],
        ["Lung Immunotherapy Response Panel", "肺部免疫治疗响应面板"],
        ["Colon Inflammation Cell Map", "结肠炎症细胞图谱"],
        ["Breast Bulk Expression Panel", "乳腺 bulk 表达面板"],
        ["Liver Fibrosis Bulk Series", "肝纤维化 bulk 序列"],
        ["Colon Regulatory Accessibility Map", "结肠调控可及性图谱"],
        ["Bone Marrow ATAC Reference", "骨髓 ATAC 参考图谱"],
        ["Brain Cortex Spatial Grid", "脑皮层空间网格"],
        ["Melanoma Spatial Margin Survey", "黑色素瘤边缘空间图谱"],
        ["Ovarian DNA Variant Set", "卵巢 DNA 变异集合"],
        ["Glioma Copy Number Survey", "胶质瘤拷贝数概览"],
      ]);
      const tokenTranslations = [
        [/\bT cell\b/g, "T 细胞"],
        [/\bB cell\b/g, "B 细胞"],
        [/\bNK cell\b/g, "NK 细胞"],
        [/\bMacrophage\b/g, "巨噬细胞"],
        [/\bTumor cell\b/g, "肿瘤细胞"],
        [/\bDendritic cell\b/g, "树突细胞"],
        [/\bMonocyte\b/g, "单核细胞"],
        [/\bEpithelial\b/g, "上皮细胞"],
        [/\bFibroblast\b/g, "成纤维细胞"],
        [/\bStem cell\b/g, "干细胞"],
        [/\bMyeloid\b/g, "髓系细胞"],
        [/\bNeuron\b/g, "神经元"],
        [/\bAstrocyte\b/g, "星形胶质细胞"],
        [/\bMicroglia\b/g, "小胶质细胞"],
        [/\bOligodendrocyte\b/g, "少突胶质细胞"],
        [/\bEndothelial\b/g, "内皮细胞"],
        [/\bUnknown\b/g, "未知"],
      ];

      function localizeText(value) {
        if (!value) return value;
        if (exactTextTranslations.has(value)) {
          return exactTextTranslations.get(value);
        }
        return tokenTranslations.reduce((current, [pattern, replacement]) => current.replace(pattern, replacement), value);
      }

      function paletteColor(label) {
        const colors = [
          "#145a46",
          "#b35c1e",
          "#315f9c",
          "#8a4b91",
          "#2b7a78",
          "#b23a48",
          "#6a7d23",
          "#6b5b95",
          "#996515",
          "#0f766e",
          "#9f1239",
          "#475569",
        ];
        let hash = 0;
        for (let i = 0; i < label.length; i += 1) {
          hash = (hash * 31 + label.charCodeAt(i)) >>> 0;
        }
        return colors[hash % colors.length];
      }

      function renderCanvas(canvas, points) {
        const width = canvas.width;
        const height = canvas.height;
        const padding = 18;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, width, height);

        ctx.fillStyle = "#f8f4eb";
        ctx.fillRect(0, 0, width, height);

        if (!points.length) {
          ctx.fillStyle = "#66715f";
          ctx.font = "16px sans-serif";
          ctx.fillText("没有可用的嵌入点", 18, 30);
          return;
        }

        const xs = points.map((point) => point.x);
        const ys = points.map((point) => point.y);
        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const minY = Math.min(...ys);
        const maxY = Math.max(...ys);
        const xSpan = maxX - minX || 1;
        const ySpan = maxY - minY || 1;

        const scaleX = (value) => padding + ((value - minX) / xSpan) * (width - padding * 2);
        const scaleY = (value) => height - padding - ((value - minY) / ySpan) * (height - padding * 2);

        ctx.strokeStyle = "#d6cfbf";
        ctx.lineWidth = 1;
        ctx.strokeRect(0.5, 0.5, width - 1, height - 1);

        for (const point of points) {
          const label = point.label || "未知";
          ctx.fillStyle = paletteColor(label);
          ctx.beginPath();
          ctx.arc(scaleX(point.x), scaleY(point.y), 1.8, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function sampleCard(sample, embedding) {
        const article = document.createElement("article");
        article.className = "card";

        const title = document.createElement("h2");
        title.textContent = localizeText(sample.title) || sample.sample_code;
        article.appendChild(title);

        const meta = document.createElement("p");
        meta.className = "meta";
        meta.textContent = `${sample.sample_code} | ${sample.group.group_name || sample.group.group_code} | ${sample.single_cell_cell_count} 行`;
        article.appendChild(meta);

        const canvas = document.createElement("canvas");
        canvas.width = 520;
        canvas.height = 320;
        article.appendChild(canvas);

        renderCanvas(canvas, embedding.points || []);

        const footer = document.createElement("div");
        footer.className = "footer";

        const left = document.createElement("span");
        left.textContent = `${embedding.returned_points || 0}/${embedding.total_points || 0} 个点`;
        footer.appendChild(left);

        const right = document.createElement("span");
        right.textContent = embedding.is_sampled ? "采样" : "完整";
        footer.appendChild(right);

        article.appendChild(footer);
        return article;
      }

      async function fetchJson(path) {
        const response = await fetch(`${apiBase}${path}`);
        if (!response.ok) {
          throw new Error(`Request failed: ${path}`);
        }
        return response.json();
      }

      async function loadAll() {
        const maxPoints = Number(maxPointsInput.value) || 2500;
        statusEl.textContent = "正在加载数据集列表...";
        statusEl.className = "status";
        gridEl.innerHTML = "";
        apiBaseEl.textContent = apiBase.split(":").pop();

        try {
          const samples = await fetchJson("/samples?has_single_cell=true");
          datasetCountEl.textContent = samples.length.toLocaleString();
          cellCountEl.textContent = samples.reduce((sum, sample) => sum + (sample.single_cell_cell_count || 0), 0).toLocaleString();

          statusEl.textContent = `正在加载 ${samples.length} 个样本的 embedding...`;

          let drawnPoints = 0;
          for (let index = 0; index < samples.length; index += 1) {
            const sample = samples[index];
            const embedding = await fetchJson(
              `/samples/${encodeURIComponent(sample.sample_id)}/embedding?max_points=${maxPoints}`
            );
            drawnPoints += embedding.returned_points || 0;
            gridEl.appendChild(sampleCard(sample, embedding));
            statusEl.textContent = `已完成 ${index + 1}/${samples.length} 个样本`;
          }

          drawnCountEl.textContent = drawnPoints.toLocaleString();
          statusEl.textContent = `加载完成，共展示 ${samples.length} 个样本。`;
        } catch (error) {
          statusEl.textContent = `加载失败：${error.message}`;
          statusEl.className = "status error";
        }
      }

      reloadButton.addEventListener("click", loadAll);
      loadAll();
    </script>
  </body>
</html>
